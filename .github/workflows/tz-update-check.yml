name: Check IANA Timezone Database Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check-tz-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # Required so the bundled tzdata version (moment-timezone's
        # data file) is available for inspection. Use `npm ci` for
        # reproducibility — no lockfile drift in CI.
        run: npm ci

      - name: Check for IANA timezone database updates
        id: tz-check
        run: |
          # Get the IANA tz version bundled with moment-timezone (the
          # source of truth for our API since the tzdb-decouple cutover).
          # Previously this read process.versions.tz from Node's ICU,
          # which is no longer the source the API uses.
          CURRENT_TZ=$(node -e "console.log(require('moment-timezone').tz.dataVersion || 'unknown')")
          echo "current_tz=$CURRENT_TZ" >> $GITHUB_OUTPUT
          echo "Current bundled tzdata (moment-timezone): $CURRENT_TZ"

          # Fetch the latest IANA tz release from the official source
          LATEST_TZ=$(curl -sf "https://data.iana.org/time-zones/tzdb/version" | tr -d '[:space:]')
          echo "latest_tz=$LATEST_TZ" >> $GITHUB_OUTPUT
          echo "Latest IANA tz release: $LATEST_TZ"

          # Compare
          if [ "$CURRENT_TZ" = "$LATEST_TZ" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "Timezone data is up to date."
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "Timezone data is BEHIND. Current: $CURRENT_TZ, Latest: $LATEST_TZ"
          fi

      - name: Create or update issue if behind
        if: steps.tz-check.outputs.up_to_date == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.tz-check.outputs.current_tz }}';
            const latest = '${{ steps.tz-check.outputs.latest_tz }}';
            const title = `IANA Timezone Database update available: ${latest}`;

            // Check if an open issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tz-update',
            });

            const existing = issues.find(i => i.title.startsWith('IANA Timezone Database update available'));
            if (existing) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Weekly check: latest IANA tz version is **${latest}**, ChronoShield API is running **${current}**.\n\nTo update, run \`npm run tz:update\` locally and commit the resulting package-lock.json change.`,
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['tz-update'],
                body: [
                  `## IANA Timezone Database Update Available`,
                  ``,
                  `| | Version |`,
                  `|---|---|`,
                  `| **Current (moment-timezone)** | \`${current}\` |`,
                  `| **Latest (from IANA)** | \`${latest}\` |`,
                  ``,
                  `### What this means`,
                  `A newer version of the IANA timezone database has been published. This may include:`,
                  `- Countries changing their DST rules`,
                  `- New timezone identifiers`,
                  `- Corrections to historical timezone data`,
                  ``,
                  `### How to update`,
                  `Since the tzdb-decouple cutover, tzdata is bundled via the \`moment-timezone\` npm package — independent of the Node.js version. To update:`,
                  ``,
                  `1. **Run the update script locally:**`,
                  `   \`\`\`bash`,
                  `   npm run tz:update`,
                  `   \`\`\``,
                  `   This bumps moment-timezone, runs the parity harness against Luxon's IANAZone, and runs the full test suite. If anything diverges, the script reports details and exits non-zero.`,
                  ``,
                  `2. **If parity passes**, commit the lockfile change:`,
                  `   \`\`\`bash`,
                  `   git add package.json package-lock.json`,
                  `   git commit -m "Bump tzdata: ${current} → ${latest}"`,
                  `   git push`,
                  `   \`\`\``,
                  ``,
                  `3. **If parity fails**, the failure output identifies the diverging (zone, date) pairs. Most failures here will be legitimate — moment-timezone tracking a real legislative DST change that Luxon's Intl-backed implementation doesn't have yet. If so, add the divergence to \`KNOWN_DIVERGENCES\` in \`tests/bundled-zone-fuzz.test.ts\` with a justification comment, then re-run \`npm run tz:update\`.`,
                  ``,
                  `4. **Verify after deploy** by hitting \`/v1/datetime/version\` to confirm the new tzdata version is live.`,
                  ``,
                  `_This issue was created automatically by the weekly tz-update-check workflow._`,
                ].join('\n'),
              });
              console.log('Created new tz-update issue');
            }

      - name: Summary
        run: |
          echo "### Timezone Data Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Current (moment-timezone) | \`${{ steps.tz-check.outputs.current_tz }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest (IANA) | \`${{ steps.tz-check.outputs.latest_tz }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Up to date | ${{ steps.tz-check.outputs.up_to_date }} |" >> $GITHUB_STEP_SUMMARY
